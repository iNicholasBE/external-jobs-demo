spring.application.name=external-jobs-demo
server.port=8080

# --- Database ---
spring.datasource.url=jdbc:postgresql://localhost:5432/demo
spring.datasource.username=postgres
spring.datasource.password=password


# --- JobRunr Pro ---
jobrunr.dashboard.enabled=true
jobrunr.dashboard.type=embedded
jobrunr.background-job-server.enabled=true
jobrunr.background-job-server.worker-count=4

# Priority queues: high-prio jobs are processed before low-prio
jobrunr.queues.names=high-prio,low-prio
jobrunr.queues.default-queue-name=low-prio

# --- Replicate (GPU video generation) ---
replicate.api-token=${REPLICATE_API_TOKEN:r8_placeholder}

# --- Dev ---
spring.thymeleaf.cache=false
